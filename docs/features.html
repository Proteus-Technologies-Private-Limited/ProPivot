<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProPivot — column features gallery</title>
  <meta name="description" content="Live ProPivot examples for display formats, column resize & reorder, the column-properties panel, PDF-matches-preview export, and events — each with copy-paste code and an open-in-playground link." />
  <link rel="stylesheet" href="./assets/propivot.css" />
  <style>
    :root { --ink:#1f2430; --muted:#6b7280; --accent:#2f6fdb; --border:#e3e6ec; --bg:#f7f8fa; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); }
    header.top { padding:14px 22px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
    header.top h1 { font-size:18px; margin:0; }
    header.top small { color:var(--muted); }
    header.top .sitelinks { margin-left:auto; display:flex; gap:16px; }
    header.top .sitelinks a { color:var(--accent); text-decoration:none; font-size:13px; }
    .layout { display:flex; min-height:calc(100vh - 53px); }
    nav.side { width:230px; flex:0 0 230px; background:#fff; border-right:1px solid var(--border); padding:12px 0; }
    nav.side button {
      display:block; width:100%; text-align:left; border:none; background:none; cursor:pointer;
      padding:10px 18px; font-size:14px; color:var(--ink); border-left:3px solid transparent;
    }
    nav.side button:hover { background:var(--bg); }
    nav.side button.active { border-left-color:var(--accent); color:var(--accent); font-weight:600; background:#f0f5ff; }
    nav.side .navhint { padding:8px 18px; font-size:11px; color:var(--muted); }
    main { flex:1; min-width:0; padding:22px 26px; }
    main h2 { margin:0 0 6px; font-size:22px; }
    .desc { color:#374151; line-height:1.55; max-width:820px; }
    .desc code { background:#eef1f5; padding:1px 5px; border-radius:4px; font-size:13px; }
    .desc ul { margin:8px 0; }
    .tryhint { background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; padding:8px 12px; border-radius:8px; font-size:13px; margin:12px 0; max-width:820px; }
    .panel { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px; margin:14px 0; }
    .panel h3 { margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    #demo #pivot { height:380px; border:1px solid var(--border); border-radius:8px; }
    .log { margin:10px 0 0; max-height:130px; overflow:auto; background:#0f172a; color:#cbd5e1; padding:10px; border-radius:8px; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre-wrap; }
    .codewrap { position:relative; }
    pre.code { margin:0; background:#0f172a; color:#e2e8f0; padding:14px; border-radius:8px; overflow:auto; font:12.5px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .btnrow { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn { border:1px solid var(--border); background:#fff; color:var(--ink); border-radius:7px; padding:7px 12px; font-size:13px; cursor:pointer; }
    .btn:hover { border-color:var(--accent); color:var(--accent); }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .cdnnote { font-size:12px; color:var(--muted); margin-top:18px; max-width:820px; line-height:1.5; }
    .cdnnote code { background:#eef1f5; padding:1px 4px; border-radius:4px; }
    @media (max-width:760px){ nav.side { display:none; } }
  </style>
</head>
<body>
  <header class="top">
    <h1>ProPivot</h1>
    <small>column features gallery — live demos, copy-paste code, open in a playground</small>
    <nav class="sitelinks">
      <a href="./index.html">Home</a>
      <a href="./gallery.html">Gallery</a>
      <a href="./demo.html">2M demo</a>
      <a href="https://github.com/Proteus-Technologies-Private-Limited/ProPivot">GitHub ★</a>
    </nav>
  </header>

  <div class="layout">
    <nav class="side" id="nav"></nav>
    <main>
      <h2 id="title"></h2>
      <div class="desc" id="desc"></div>
      <div id="tryhint"></div>

      <div class="panel">
        <h3>Live demo</h3>
        <div id="demo"></div>
      </div>

      <div class="panel">
        <h3>Sample code</h3>
        <div class="codewrap">
          <pre class="code"><code id="code"></code></pre>
        </div>
        <div class="btnrow">
          <button class="btn" id="copy">Copy code</button>
          <button class="btn primary" id="codepen">Open in CodePen</button>
          <button class="btn" id="jsfiddle">Open in JSFiddle</button>
        </div>
      </div>

      <p class="cdnnote">
        Playground samples load the library straight from this project's site:
        <code id="cdnjs"></code> and <code id="cdncss"></code>.
        The grid mounts into <code>&lt;div id="pivot"&gt;</code> and logs into <code>&lt;pre id="log"&gt;</code>.
      </p>
    </main>
  </div>

  <script src="./assets/propivot.global.js"></script>
  <script>
    // ── Playground loads the bundle from this GitHub Pages site (always live). ──
    const SITE = 'https://proteus-technologies-private-limited.github.io/ProPivot';
    const CDN_JS = SITE + '/assets/propivot.global.js';
    const CDN_CSS = SITE + '/assets/propivot.css';
    document.getElementById('cdnjs').textContent = CDN_JS;
    document.getElementById('cdncss').textContent = CDN_CSS;

    // Shared sample dataset, inlined into every snippet so each is self-contained.
    const DATA_ROWS = [
      { region: 'West',  category: 'Furniture', year: 2023, sales: 1200, qty: 6 },
      { region: 'West',  category: 'Tech',      year: 2024, sales: 9000, qty: 22 },
      { region: 'East',  category: 'Furniture', year: 2023, sales:  600, qty: 3 },
      { region: 'East',  category: 'Tech',      year: 2024, sales: 2600, qty: 12 },
      { region: 'North', category: 'Furniture', year: 2024, sales: 4200, qty: 9 },
      { region: 'North', category: 'Tech',      year: 2023, sales: 1500, qty: 7 },
    ];

    const PREAMBLE =
`const PP = window.ProPivot;
const log = (m) => { const el = document.getElementById('log'); if (el) el.textContent = m + '\\n' + el.textContent; };
`;
    const DATA = 'const data = ' + JSON.stringify(DATA_ROWS, null, 2) + ';\n\n';

    // ── Feature definitions ───────────────────────────────────────────────────
    const FEATURES = [
      {
        id: 'display-formats',
        title: 'Display formats',
        desc:
          `<p>Attach a rich <code>display</code> format to any column — gated by its data type.
           Numeric measures get <code>data_bar</code>, <code>heatmap</code>, <code>progress</code>,
           <code>signed</code>, <code>rating</code>, … ; text/date dimension columns get
           <code>status_tag</code>, <code>boolean</code>, <code>date</code>, <code>template</code>, … .
           Formats are display-only — they never change aggregation or the stored value.</p>`,
        hint: 'The <b>Sales</b> column shows a data bar; <b>Qty</b> uses a heatmap background; the <b>Region</b> rows render as status tags.',
        body:
`const pivot = new PP({
  container: '#pivot',
  report: {
    dataSource: {
      type: 'json', data,
      mapping: { region: { type: 'string' }, year: { type: 'number' }, sales: { type: 'number' }, qty: { type: 'number' } },
    },
    slice: {
      rows: [{
        uniqueName: 'region',
        display: { type: 'status_tag', map: [
          { when: 'West',  color: 'green', label: 'West' },
          { when: 'East',  color: 'blue',  label: 'East' },
          { when: 'North', color: 'amber', label: 'North' },
        ] },
      }],
      columns: [{ uniqueName: 'year' }],
      measures: [
        { uniqueName: 'sales', aggregation: 'sum', caption: 'Sales',
          display: { type: 'data_bar', min: 0, max: 12000, color: 'blue' } },
        { uniqueName: 'qty', aggregation: 'sum', caption: 'Qty',
          display: { type: 'heatmap', applyTo: 'background', thresholds: [10, 20, 30] } },
      ],
    },
  },
});
log('Tip: open a column panel (▾) → Display tab to change formats live.');`,
      },

      {
        id: 'column-panel',
        title: 'Column-properties panel',
        desc:
          `<p>Click the <b>▾</b> button on any column header to open a context-aware panel.
           Measure columns expose <b>Properties</b> (heading, aggregation, width),
           <b>Display</b>, <b>Conditional</b> (an expression + color-picker rule builder) and
           <b>Filter</b> (Top/Bottom-N). Dimension columns expose Properties, Display and a
           distinct-value member <b>Filter</b>.</p>
           <p>Disable it with <code>options.columnProperties: false</code>, or fine-tune with
           <code>{ edit, resize, reorder }</code>.</p>`,
        hint: 'Click the ▾ on the <b>Sales</b> header → try the <b>Conditional</b> tab (e.g. <code>&gt; 5000</code>, pick a color) and the <b>Display</b> tab.',
        body:
`const pivot = new PP({
  container: '#pivot',
  report: {
    dataSource: { type: 'json', data },
    slice: {
      rows: [{ uniqueName: 'region' }, { uniqueName: 'category' }],
      columns: [{ uniqueName: 'year' }],
      measures: [{ uniqueName: 'sales', aggregation: 'sum' }],
    },
  },
  // Fires whenever a property is committed from the panel.
  columnpropertychange: (e) => log('columnpropertychange → ' + JSON.stringify(e)),
});
log('Click the ▾ on any column header to open the panel.');`,
      },

      {
        id: 'resize',
        title: 'Column resize (drag)',
        desc:
          `<p>Hover a column header's right edge and drag to resize. Widths persist on the
           column and are applied through a <code>&lt;colgroup&gt;</code>, so they survive
           the virtualized scroll. Each commit fires <code>columnresize</code>; you can also
           set widths programmatically with <code>pivot.setColumnWidth(ref, px)</code>.</p>`,
        hint: 'Drag the right edge of the <b>Sales</b> or <b>region</b> header — watch the log below.',
        body:
`const pivot = new PP({
  container: '#pivot',
  report: {
    dataSource: { type: 'json', data },
    slice: {
      rows: [{ uniqueName: 'region' }, { uniqueName: 'category' }],
      columns: [{ uniqueName: 'year' }],
      measures: [{ uniqueName: 'sales', aggregation: 'sum' }],
    },
  },
  columnresize: (e) => log('columnresize → ' + e.ref.uniqueName + ' = ' + e.width + 'px'),
});
log('Drag the right edge of any column header to resize.');`,
      },

      {
        id: 'reorder',
        title: 'Column reorder (drag-drop)',
        desc:
          `<p>Drag a column header onto another to reorder within its zone, or onto a Field-List
           zone (Rows / Columns / Values) to move it across zones. The column keeps its width,
           display format and filter. Each move fires <code>columnreorder</code>; the
           programmatic form is <code>pivot.reorderColumn(name, zone, index)</code>.</p>`,
        hint: 'Drag the <b>category</b> header onto <b>region</b> to swap them, or drag a field between the Rows/Columns/Values boxes above the grid.',
        body:
`const pivot = new PP({
  container: '#pivot',
  report: {
    dataSource: { type: 'json', data },
    slice: {
      rows: [{ uniqueName: 'region' }, { uniqueName: 'category' }],
      columns: [{ uniqueName: 'year' }],
      measures: [{ uniqueName: 'sales', aggregation: 'sum' }, { uniqueName: 'qty', aggregation: 'sum' }],
    },
  },
  columnreorder: (e) => log('columnreorder → ' + e.uniqueName + ': ' + e.fromZone + ' → ' + e.toZone + ' @' + e.toIndex),
});
log('Drag a header onto another, or drag fields between the Rows/Columns/Values zones.');`,
      },

      {
        id: 'pdf-parity',
        title: 'PDF export = HTML preview',
        desc:
          `<p>Export now matches what you see: background fills, conditional formatting, data
           bars, text colors, bold and alignment are all carried into the PDF (and the SVG
           image export) by the same presentation engine the grid uses — with no extra
           dependencies. Call <code>pivot.exportTo('pdf')</code> (or <code>'image'</code>,
           <code>'excel'</code>, <code>'csv'</code>, <code>'html'</code>).</p>`,
        hint: 'Click <b>Export PDF</b> — the green conditional fill and the blue data bars appear in the PDF exactly as on screen.',
        body:
`const pivot = new PP({
  container: '#pivot',
  report: {
    dataSource: { type: 'json', data },
    slice: {
      rows: [{ uniqueName: 'region' }],
      columns: [{ uniqueName: 'year' }],
      measures: [{ uniqueName: 'sales', aggregation: 'sum',
        display: { type: 'data_bar', min: 0, max: 12000, color: '#2f6fdb' } }],
    },
    conditions: [
      { formula: '#value > 6000', measure: 'sales', format: { backgroundColor: '#c5e1a5', color: '#1b5e20' } },
    ],
  },
});

const btn = document.createElement('button');
btn.textContent = 'Export PDF';
btn.style.cssText = 'margin:10px 0;padding:8px 14px;cursor:pointer';
btn.onclick = () => pivot.exportTo('pdf', { filename: 'propivot-sample' });
document.getElementById('pivot').after(btn);
log('Click “Export PDF” — bars + green fill carry into the file.');`,
      },

      {
        id: 'events',
        title: 'Events',
        desc:
          `<p>Subscribe with <code>pivot.on(event, handler)</code> or pass handlers inline in the
           config. Column events — <code>columnresize</code>, <code>columnreorder</code>,
           <code>columnpropertychange</code> — join the existing ones (<code>cellclick</code>,
           <code>reportcomplete</code>, …). They're forwarded by the React and Angular wrappers too.</p>`,
        hint: 'Interact with the grid — click a cell, resize/reorder a column, edit a property — and watch every event stream into the log.',
        body:
`const pivot = new PP({
  container: '#pivot',
  report: {
    dataSource: { type: 'json', data },
    slice: {
      rows: [{ uniqueName: 'region' }],
      columns: [{ uniqueName: 'year' }],
      measures: [{ uniqueName: 'sales', aggregation: 'sum' }],
    },
  },
});

pivot.on('cellclick',            (d) => log('cellclick → ' + (d.label ?? d.value)));
pivot.on('columnresize',         (e) => log('columnresize → ' + e.ref.uniqueName + ' ' + e.width + 'px'));
pivot.on('columnreorder',        (e) => log('columnreorder → ' + e.uniqueName + ' → ' + e.toZone));
pivot.on('columnpropertychange', (e) => log('columnpropertychange → ' + e.property));
log('Click cells, resize/reorder columns, or edit a column property.');`,
      },
    ];

    FEATURES.forEach((f) => { f.code = PREAMBLE + DATA + f.body; });

    // ── Playground wiring ─────────────────────────────────────────────────────
    const PLAY_HTML = '<div id="pivot"></div>\n<pre id="log"></pre>';
    const PLAY_CSS = '#pivot { height: 380px; }\n#log { font: 12px/1.5 ui-monospace, monospace; color: #374151; white-space: pre-wrap; max-height: 160px; overflow: auto; }';

    function submitForm(action, fields) {
      const f = document.createElement('form');
      f.method = 'POST'; f.action = action; f.target = '_blank';
      for (const k in fields) {
        const i = document.createElement('input');
        i.type = 'hidden'; i.name = k; i.value = fields[k];
        f.appendChild(i);
      }
      document.body.appendChild(f); f.submit(); f.remove();
    }
    function openCodePen(feature) {
      const data = {
        title: 'ProPivot — ' + feature.title,
        html: PLAY_HTML, css: PLAY_CSS, js: feature.code,
        css_external: CDN_CSS, js_external: CDN_JS, editors: '111',
      };
      submitForm('https://codepen.io/pen/define', { data: JSON.stringify(data) });
    }
    function openJsFiddle(feature) {
      submitForm('https://jsfiddle.net/api/post/library/pure/', {
        title: 'ProPivot — ' + feature.title,
        html: PLAY_HTML, css: PLAY_CSS, js: feature.code,
        resources: CDN_CSS + ',' + CDN_JS, wrap: 'b',
      });
    }

    // ── Render ────────────────────────────────────────────────────────────────
    const nav = document.getElementById('nav');
    const navHint = document.createElement('div');
    navHint.className = 'navhint';
    navHint.textContent = 'Pick a feature:';
    nav.appendChild(navHint);

    let current = null;
    FEATURES.forEach((f) => {
      const b = document.createElement('button');
      b.textContent = f.title;
      b.dataset.id = f.id;
      b.addEventListener('click', () => { location.hash = f.id; });
      nav.appendChild(b);
    });

    function render(feature) {
      current = feature;
      document.querySelectorAll('#nav button').forEach((b) => b.classList.toggle('active', b.dataset.id === feature.id));
      document.getElementById('title').textContent = feature.title;
      document.getElementById('desc').innerHTML = feature.desc;
      document.getElementById('tryhint').innerHTML = feature.hint ? '<div class="tryhint">▶ ' + feature.hint + '</div>' : '';
      document.getElementById('code').textContent = feature.code;

      const demo = document.getElementById('demo');
      demo.innerHTML = '<div id="pivot"></div><pre id="log" class="log"></pre>';
      try {
        new Function(feature.code)();
      } catch (e) {
        document.getElementById('log').textContent = 'Error: ' + (e && e.message ? e.message : e);
        console.error(e);
      }
    }

    document.getElementById('copy').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(current.code); document.getElementById('copy').textContent = 'Copied ✓'; setTimeout(() => (document.getElementById('copy').textContent = 'Copy code'), 1200); }
      catch { /* clipboard unavailable */ }
    });
    document.getElementById('codepen').addEventListener('click', () => openCodePen(current));
    document.getElementById('jsfiddle').addEventListener('click', () => openJsFiddle(current));

    function fromHash() {
      const id = location.hash.replace('#', '');
      return FEATURES.find((f) => f.id === id) || FEATURES[0];
    }
    window.addEventListener('hashchange', () => render(fromHash()));
    render(fromHash());
  </script>
</body>
</html>
