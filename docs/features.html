<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ProPivot — feature examples</title>
  <meta name="description" content="A focused, runnable example for every ProPivot feature: layouts, 17 aggregations, calculated measures, conditional & display formatting, date hierarchies, sorting/Top-N, column resize/reorder/properties, export, drill-through and events — each with copy-paste code and an open-in-playground link." />
  <link rel="stylesheet" href="./assets/propivot.css?v=a01438b7" />
  <link rel="stylesheet" href="./assets/site.css?v=a4a99571" />
  <style>
    :root { --ink:#1f2430; --muted:#6b7280; --accent:#2f6fdb; --border:#e3e6ec; --bg:#f7f8fa; }
    * { box-sizing: border-box; }
    body { margin:0; font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif; color:var(--ink); background:var(--bg); }
    header.top { padding:14px 22px; background:#fff; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
    header.top h1 { font-size:18px; margin:0; }
    header.top small { color:var(--muted); }
    header.top .sitelinks { margin-left:auto; display:flex; gap:16px; }
    header.top .sitelinks a { color:var(--accent); text-decoration:none; font-size:13px; }
    .layout { display:flex; min-height:calc(100vh - 58px); }
    nav.side { width:240px; flex:0 0 240px; background:#fff; border-right:1px solid var(--border); padding:8px 0 20px; overflow:auto; }
    nav.side .navgroup { padding:12px 18px 4px; font-size:10.5px; font-weight:700; letter-spacing:.06em; text-transform:uppercase; color:#9aa1ad; }
    nav.side button { display:block; width:100%; text-align:left; border:none; background:none; cursor:pointer; padding:7px 18px; font-size:13.5px; color:var(--ink); border-left:3px solid transparent; }
    nav.side button:hover { background:var(--bg); }
    nav.side button.active { border-left-color:var(--accent); color:var(--accent); font-weight:600; background:#f0f5ff; }
    main { flex:1; min-width:0; padding:22px 26px; }
    main h2 { margin:0 0 6px; font-size:22px; }
    .desc { color:#374151; line-height:1.55; max-width:840px; }
    .desc code { background:#eef1f5; padding:1px 5px; border-radius:4px; font-size:13px; }
    .tryhint { background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; padding:8px 12px; border-radius:8px; font-size:13px; margin:12px 0; max-width:840px; }
    .panel { background:#fff; border:1px solid var(--border); border-radius:10px; padding:14px; margin:14px 0; }
    .panel h3 { margin:0 0 10px; font-size:13px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
    #demo #pivot { height:380px; border:1px solid var(--border); border-radius:8px; }
    .note { color:var(--muted); font-size:13px; padding:24px; text-align:center; border:1px dashed var(--border); border-radius:8px; }
    .log { margin:10px 0 0; max-height:130px; overflow:auto; background:#0f172a; color:#cbd5e1; padding:10px; border-radius:8px; font:12px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre-wrap; }
    pre.code { margin:0; background:#0f172a; color:#e2e8f0; padding:14px; border-radius:8px; overflow:auto; font:12.5px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace; }
    .btnrow { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .btn { border:1px solid var(--border); background:#fff; color:var(--ink); border-radius:7px; padding:7px 12px; font-size:13px; cursor:pointer; }
    .btn:hover { border-color:var(--accent); color:var(--accent); }
    .btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
    .cdnnote { font-size:12px; color:var(--muted); margin-top:18px; max-width:840px; line-height:1.5; }
    .cdnnote code { background:#eef1f5; padding:1px 4px; border-radius:4px; }
    @media (max-width:760px){ nav.side { display:none; } }
  </style>
</head>
<body>
  <header class="ppnav">
    <div class="ppnav-inner">
      <a class="ppnav-brand" href="./index.html"><span class="ppnav-dot"></span> ProPivot</a>
      <nav class="ppnav-links">
        <a href="./index.html#features">Features</a>
        <a href="./demo.html">2M demo</a>
        <a href="./gallery.html">Gallery</a>
        <a href="./upload.html">Your data</a>
        <a class="active" href="./features.html">Examples</a>
        <a href="./starters.html">Starters</a>
        <a href="./docs.html">Docs</a>
        <a class="ppnav-gh" href="https://github.com/Proteus-Technologies-Private-Limited/ProPivot">GitHub ★</a>
      </nav>
    </div>
  </header>

  <div class="layout">
    <nav class="side" id="nav"></nav>
    <main>
      <h2 id="title"></h2>
      <div class="desc" id="desc"></div>
      <div id="tryhint"></div>

      <div class="panel">
        <h3>Live demo</h3>
        <div id="demo"></div>
      </div>

      <div class="panel">
        <h3>Sample code</h3>
        <pre class="code"><code id="code"></code></pre>
        <div class="btnrow">
          <button class="btn" id="copy">Copy code</button>
          <button class="btn" id="download">⬇ Download code</button>
          <button class="btn primary" id="codepen">Open in CodePen</button>
          <button class="btn" id="jsfiddle">Open in JSFiddle</button>
        </div>
      </div>

      <p class="cdnnote">
        Playground samples load the library from this project's site:
        <code id="cdnjs"></code> and <code id="cdncss"></code>.
        Each snippet mounts into <code>&lt;div id="pivot"&gt;</code> and logs into <code>&lt;pre id="log"&gt;</code>.
      </p>
    </main>
  </div>

  <script>
    window.GALLERY_CFG = {
      cdnJs: 'https://proteus-technologies-private-limited.github.io/ProPivot/assets/propivot.global.js?v=b72678eb',
      cdnCss: 'https://proteus-technologies-private-limited.github.io/ProPivot/assets/propivot.css?v=a01438b7',
    };
  </script>
  <script src="./assets/propivot.global.js?v=b72678eb"></script>
  <script src="./assets/gallery.js?v=06b003ac"></script>
</body>
</html>
